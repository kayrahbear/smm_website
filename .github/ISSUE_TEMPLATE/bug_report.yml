name: Bug Report
description: Something is broken or not displaying correctly on the site.
title: "bug: "
labels: ["bug"]
body:
  - type: input
    id: summary
    attributes:
      label: What is broken?
      placeholder: "e.g. Flashlight effect doesn't follow the cursor on iPad"
    validations:
      required: true

  - type: dropdown
    id: page
    attributes:
      label: Which page?
      options:
        - Coming Soon (home)
        - Meet the Family
        - The Book
        - About Ashley
        - For Educators
        - News & Events
        - Newsletter
        - Other / Sitewide
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device / browser
      multiple: true
      options:
        - Desktop — Chrome
        - Desktop — Safari
        - Desktop — Firefox
        - Mobile — iOS Safari
        - Mobile — Android Chrome
        - Tablet
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Do ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images here if helpful.
    validations:
      required: false
